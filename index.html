<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>難読地名クイズ</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        #start-area, #quiz-area, #result-area {
            display: none;
        }
        #start-area.active, #quiz-area.active, #result-area.active {
            display: block;
        }
        select {
            font-size: 1.1rem;
            padding: 0.5rem;
            margin-bottom: 1rem;
            width: 80%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #kanji-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 2rem 0;
            color: #2c3e50;
        }
        input[type="text"] {
            font-size: 1.2rem;
            padding: 0.5rem;
            width: 80%;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            font-size: 1.1rem;
            padding: 0.5rem 1.5rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #feedback {
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
        }
        .correct { color: #27ae60; }
        .incorrect { color: #c0392b; }
        #score-display {
            font-size: 1.5rem;
            margin: 2rem 0;
        }
        #question-counter {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .count-btn-container {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .count-btn {
            background-color: #fff;
            color: #3498db;
            border: 1px solid #3498db;
            padding: 0.5rem 1rem;
        }
        .count-btn:hover {
            background-color: #ebf5fb;
        }
        .count-btn.selected {
            background-color: #3498db;
            color: white;
        }
        .count-btn.selected:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>難読地名クイズ</h1>

        <div id="start-area" class="active">
            <p>出題地域を選択してください：</p>
            <select id="region-select">
                <option value="saitama">埼玉</option>
                <option value="tokyo">東京</option>
                <option value="kanagawa">神奈川</option>
                <option value="all">全地域</option>
            </select>
            <br>
            <p>出題数を選択してください：</p>
            <div id="count-btn-container" class="count-btn-container">
                <button type="button" class="count-btn" data-value="1">1問</button>
                <button type="button" class="count-btn" data-value="3">3問</button>
                <button type="button" class="count-btn selected" data-value="5">5問</button>
                <button type="button" class="count-btn" data-value="10">10問</button>
            </div>
            <br><br>
            <button id="start-btn">スタート</button>
        </div>

        <div id="quiz-area">
            <div id="question-counter">問題 1 / 10</div>
            <div id="kanji-display">漢字</div>
            <p>ひらがなで読みを入力してください：</p>
            <input type="text" id="answer-input" autocomplete="off" placeholder="ひらがな">
            <br>
            <button id="submit-btn">回答する</button>
            <div id="feedback"></div>
        </div>

        <div id="result-area">
            <h2>クイズ終了！</h2>
            <div id="score-display">10問中 8問 正解！</div>
            <button id="restart-btn">もう一度挑戦する</button>
        </div>
    </div>

    <script>
        const saitamaData = [
            { kanji: "越生", hiragana: "おごせ" },
            { kanji: "加須", hiragana: "かぞ" },
            { kanji: "男衾", hiragana: "おぶすま" },
            { kanji: "指扇", hiragana: "さしおうぎ" },
            { kanji: "遊馬", hiragana: "あすま" },
            { kanji: "小手指", hiragana: "こてさし" },
            { kanji: "三郷", hiragana: "みさと" },
            { kanji: "蕨", hiragana: "わらび" },
            { kanji: "嵐山", hiragana: "らんざん" },
            { kanji: "妻沼", hiragana: "めぬま" }
        ];

        const tokyoData = [
            { kanji: "石神井", hiragana: "しゃくじい" },
            { kanji: "舎人", hiragana: "とねり" },
            { kanji: "日暮里", hiragana: "にっぽり" },
            { kanji: "砧", hiragana: "きぬた" },
            { kanji: "御徒町", hiragana: "おかちまち" },
            { kanji: "馬喰町", hiragana: "ばくろちょう" },
            { kanji: "東雲", hiragana: "しののめ" },
            { kanji: "雑司が谷", hiragana: "ぞうしがや" },
            { kanji: "保谷", hiragana: "ほうや" },
            { kanji: "等々力", hiragana: "とどろき" }
        ];

        const kanagawaData = [
            { kanji: "弘明寺", hiragana: "ぐみょうじ" },
            { kanji: "帷子", hiragana: "かたびら" },
            { kanji: "尻手", hiragana: "しって" },
            { kanji: "大豆戸", hiragana: "まめど" },
            { kanji: "鉄", hiragana: "くろがね" },
            { kanji: "逸見", hiragana: "へみ" },
            { kanji: "不入斗", hiragana: "いりまず" },
            { kanji: "公所", hiragana: "ぐぞ" },
            { kanji: "鵠沼", hiragana: "くげぬま" },
            { kanji: "酒匂", hiragana: "さかわ" }
        ];

        let activeQuizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isWaitingForNext = false;

        const startArea = document.getElementById('start-area');
        const regionSelect = document.getElementById('region-select');
        let selectedCount = 5;
        const countBtns = document.querySelectorAll('.count-btn');
        const startBtn = document.getElementById('start-btn');
        const quizArea = document.getElementById('quiz-area');
        const resultArea = document.getElementById('result-area');
        const kanjiDisplay = document.getElementById('kanji-display');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score-display');
        const questionCounter = document.getElementById('question-counter');
        const restartBtn = document.getElementById('restart-btn');

        function showStartArea() {
            startArea.classList.add('active');
            quizArea.classList.remove('active');
            resultArea.classList.remove('active');
        }

        function initQuiz() {
            const region = regionSelect.value;
            const count = selectedCount;
            let pool = [];

            if (region === 'saitama') {
                pool = [...saitamaData];
            } else if (region === 'tokyo') {
                pool = [...tokyoData];
            } else if (region === 'kanagawa') {
                pool = [...kanagawaData];
            } else {
                pool = [...saitamaData, ...tokyoData, ...kanagawaData];
            }

            // Shuffle pool
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            activeQuizData = pool.slice(0, count);

            currentQuestionIndex = 0;
            score = 0;
            startArea.classList.remove('active');
            quizArea.classList.add('active');
            resultArea.classList.remove('active');
            feedback.textContent = '';
            feedback.className = '';
            isWaitingForNext = false;
            loadQuestion();
        }

        function loadQuestion() {
            const currentQ = activeQuizData[currentQuestionIndex];
            kanjiDisplay.textContent = currentQ.kanji;
            questionCounter.textContent = `問題 ${currentQuestionIndex + 1} / ${activeQuizData.length}`;
            answerInput.value = '';
            answerInput.focus();
            submitBtn.textContent = '回答する';
            isWaitingForNext = false;
        }

        function checkAnswer() {
            if (isWaitingForNext) {
                // 次の問題へ進む処理
                currentQuestionIndex++;
                if (currentQuestionIndex < activeQuizData.length) {
                    feedback.textContent = '';
                    feedback.className = '';
                    loadQuestion();
                } else {
                    showResult();
                }
                return;
            }

            const userAnswer = answerInput.value.trim();
            if (userAnswer === '') return;

            const correctAnswer = activeQuizData[currentQuestionIndex].hiragana;

            if (userAnswer === correctAnswer) {
                feedback.textContent = '正解！';
                feedback.className = 'correct';
                score++;
            } else {
                feedback.textContent = `残念... 正解は「${correctAnswer}」`;
                feedback.className = 'incorrect';
            }

            submitBtn.textContent = '次の問題へ';
            isWaitingForNext = true;
        }

        function showResult() {
            quizArea.classList.remove('active');
            resultArea.classList.add('active');
            scoreDisplay.textContent = `${activeQuizData.length}問中 ${score}問 正解！`;
        }

        startBtn.addEventListener('click', initQuiz);
        submitBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        restartBtn.addEventListener('click', showStartArea);

        countBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                countBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedCount = parseInt(btn.getAttribute('data-value'), 10);
            });
        });

        // 初期化
        showStartArea();
    </script>
</body>
</html>
